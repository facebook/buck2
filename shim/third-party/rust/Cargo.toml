# Definitions of third-party libraries used for buck2 build of buck2.
# This file is **not** used by cargo build of buck2.
# See the <project_root>/docs/bootstrapping.md for more details.

[workspace]

[package]
# Pseudo-package whose dependencies are imported and buckified
name = "rust-third-party"
version = "0.0.0"
publish = false
edition = "2021"

# Dummy target to keep Cargo happy
[[bin]]
name = "top"
path = "top/main.rs"

# List of packages to be imported, with version constraints, features
# and all options Cargo supports.
[dependencies]
annotate-snippets = { version = "0.9.1", features = ["color"] }
anyhow = "1.0.102"
anymap3 = "1.0.1"
arc-swap = "1.9.0"
argfile = "0.2.1"
assert_matches = "1.5"
async-compression = { version = "0.4.41", features = ["brotli", "bzip2", "deflate", "futures-io", "gzip", "tokio", "zlib", "zstd", "zstdmt"] }
async-condvar-fair = { version = "1.0.1", features = ["parking_lot_0_12", "tokio"] }
async-recursion = "1.1.1"
async-scoped = { version = "0.9", features = ["use-tokio"] }
async-stream = "0.3"
async-trait = "0.1.86"
atomic = "0.5.3"
backtrace = "0.3.76"
base64 = "0.22.1"
bincode = { version = "2", features = ["serde"] }
bitflags = "2.9"
blake3 = { version = "=1.8.2", features = ["mmap", "rayon", "traits-preview"] } # Check overlay before updating
bstr = { version = "1.10.0", features = ["serde", "std", "unicode"] }
buck-resources = "1"
bumpalo = { version = "3.20.2", features = ["allocator_api", "collections"] }
byteorder = "1.5"
bytemuck = { version = "1.25", features = ["const_zeroed", "derive", "min_const_generics", "must_cast", "nightly_portable_simd", "nightly_stdsimd"] }
bytes = "1.11.1"
bytesize = "2.3.1"
chrono = { version = "0.4.44", features = ["serde"] }
clap = { version = "4.6.0", features = ["derive", "env", "string", "unicode", "wrap_help"] }
clap_complete = "4.6.0"
common-path = "1.0.0"
compact_str = { version = "0.9.0", features = ["serde"] }
console = "0.15.11"
const_format = "0.2.35"
constant_time_eq = "0.2.6"
convert_case = "0.11"
criterion = { version = "0.5.1", features = ["async_tokio", "csv_output"] }
crossbeam = "0.8"
crossbeam-channel = "0.5.15"
crossterm = { version = "0.29", features = ["event-stream", "serde"] }
csv = "1.4"
ctor = "0.1.26"
dashmap = { version = "6.1.0", features = ["rayon", "serde"] }
debugserver-types = "0.5.0"
derivative = "2.2"
derive_more = { version = "1.0.0", features = ["full"] }
digest = { version = "0.10", features = ["rand_core"] }
dirs = "6.0"
dunce = "1.0.5"
either = "1.5"
elf = "0.8"
