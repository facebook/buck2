tokio-stream = { version = "0.1.18", features = ["fs", "io-util", "net", "signal", "sync", "time"] }
tokio-util = { version = "0.7.18", features = ["full"] }
toml = { version = "0.9.12", features = ["preserve_order"] }
tonic = { version = "0.14.5", features = ["codegen", "gzip", "tls-native-roots", "tls-ring", "tls-webpki-roots", "transport"] }
tonic-build = "0.14.5"
tonic-prost = "0.14.5"
tonic-prost-build = "0.14.5"
tower = { version = "0.5.3", features = ["util"] }
