quote = "1.0.45"
rand = "0.10"
rand_chacha = "0.10"
rand_distr = "0.6"
rand_xoshiro = "0.8"
ref-cast = "1.0.18"
regex = "1.12.3"
relative-path = { version = "1.7.0", features = ["serde"] }
ring = "=0.17.14" # Upgrading this is possible, but a pain, so we don't want to pick up every new minor version
rusqlite = { version = "0.37.0", features = ["backup", "blob", "bundled", "column_decltype", "functions", "limits", "modern_sqlite", "serde_json"] }
rustc-hash = "2.1.2"
rustls = { version = "0.23.37", features = ["logging", "ring", "std", "tls12"], default-features = false }
rustls-native-certs = "0.8.3"
rustls-pemfile = "2.2.0"
rustls-pki-types = { version = "1.14.0", features = ["alloc", "std"] }
rustyline = { version = "18.0.0", features = ["derive"] }
scopeguard = "1.2.0"
sequence_trie = { version = "0.3.6", features = ["serde"] }
serde = { version = "1.0.219", features = ["derive", "rc"] }
serde_json = { version = "1.0.140", features = ["raw_value"] }
sha1 = "0.10.5"
sha2 = "0.10.6"
