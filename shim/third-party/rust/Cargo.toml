plist = "1.8.0"
postcard = { version = "1.0.8", features = ["use-crc", "use-std"] }
pretty_assertions = "1.4.1"
probminhash = { git = "https://github.com/krallin/probminhash", rev = "3d6b7a5315305c2893a7a04e0de9e23b305992c5", default-features = false } # WAITING_FOR_PR https://github.com/jean-pierreBoth/probminhash/pull/4
proc-macro2 = { version = "1.0.106", features = ["span-locations"] }
prost = { version = "0.14.3", default-features = false }
prost-types = { version = "0.14.3", default-features = false }
prost-build = { version = "0.14.3", features = ["cleanup-markdown"] }
protoc-bin-vendored = "3.0.0"
psutil = "3.3.0"
ptyprocess = "0.4.1"
quick-xml = { version = "0.37", features = ["overlapped-lists", "serialize"] }
