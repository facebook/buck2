buildscript.run = false

['cfg(version = "=0.17.14")']
cargo_env = [
    "CARGO_PKG_NAME",
    "CARGO_PKG_VERSION_MAJOR",
    "CARGO_PKG_VERSION_MINOR",
    "CARGO_PKG_VERSION_PATCH",
    "CARGO_PKG_VERSION_PRE",
]
['cfg(version = "=0.17.14")'.env]
RING_CORE_PREFIX = "ring_core_0_17_14"

[['cfg(all(version = "=0.17.14", target_arch = "x86_64", target_os = "linux"))'.cxx_library]]
name = "ring-c-asm-elf-x86_84"
srcs = ["crypto/**/*.c", "pregenerated/*x86_64*-elf.S", "third_party/fiat/asm/*.S"]
headers = ["include/**/*.h", "crypto/**/*.h", "third_party/**/*.h", "crypto/**/*.inl"]
include_paths = ["include", "."]
fixup_include_paths = ["include"]
compiler_flags = ["-Wno-error"]
preferred_linkage = "static"

[['cfg(all(version = "=0.17.14", target_arch = "aarch64", target_os = "linux"))'.cxx_library]]
name = "ring-c-asm-elf-aarch64"
srcs = ["crypto/**/*.c", "pregenerated/*armv8*-linux64.S", "pregenerated/*armx*-linux64.S", "third_party/fiat/asm/*.S"]
headers = ["include/**/*.h", "crypto/**/*.h", "third_party/**/*.h", "crypto/**/*.inl"]
include_paths = ["include"]
fixup_include_paths = ["include"]
compiler_flags = ["-Wno-error"]
preferred_linkage = "static"

[['cfg(all(version = "=0.17.14", target_arch = "powerpc64", target_os = "linux"))'.cxx_library]]
name = "ring-c-asm-elf-powerpc64"
srcs = ["crypto/**/*.c"]
headers = ["include/**/*.h", "crypto/**/*.h", "third_party/**/*.h", "crypto/**/*.inl"]
include_paths = ["include"]
fixup_include_paths = ["include"]
compiler_flags = ["-Wno-error"]
preferred_linkage = "static"

[['cfg(all(version = "=0.17.14", target_arch = "x86_64", target_os = "android"))'.cxx_library]]
name = "ring-c-asm-elf-x86_84"
srcs = ["crypto/**/*.c", "pregenerated/*x86_64*-elf.S", "third_party/fiat/asm/*.S"]
headers = ["include/**/*.h", "crypto/**/*.h", "third_party/**/*.h", "crypto/**/*.inl"]
include_paths = ["include"]
fixup_include_paths = ["include"]
compiler_flags = ["-Wno-error"]
preferred_linkage = "static"

[['cfg(all(version = "=0.17.14", target_arch = "aarch64", target_os = "android"))'.cxx_library]]
name = "ring-c-asm-elf-aarch64"
srcs = ["crypto/**/*.c", "pregenerated/*armv8*-linux64.S", "pregenerated/*armx*-linux64.S", "third_party/fiat/asm/*.S"]
headers = ["include/**/*.h", "crypto/**/*.h", "third_party/**/*.h", "crypto/**/*.inl"]
include_paths = ["include"]
fixup_include_paths = ["include"]
compiler_flags = ["-Wno-error"]
preferred_linkage = "static"

[['cfg(all(version = "=0.17.14", target_arch = "x86_64", target_os = "macos"))'.cxx_library]]
name = "ring-c-asm-macos-x86_64"
srcs = ["crypto/**/*.c", "pregenerated/*x86_64*-macosx.S", "third_party/fiat/asm/*.S"]
headers = ["include/**/*.h", "crypto/**/*.h", "third_party/**/*.h", "crypto/**/*.inl"]
include_paths = ["include"]
fixup_include_paths = ["include"]
compiler_flags = ["-Wno-error"]
preferred_linkage = "static"

[['cfg(all(version = "=0.17.14", target_arch = "aarch64", target_os = "macos"))'.cxx_library]]
name = "ring-c-asm-macos-arm64"
srcs = ["crypto/**/*.c", "pregenerated/*armv8*-ios64.S", "pregenerated/*armx*-ios64.S", "third_party/fiat/asm/*.S"]
headers = ["include/**/*.h", "crypto/**/*.h", "third_party/**/*.h", "crypto/**/*.inl"]
include_paths = ["include"]
fixup_include_paths = ["include"]
compiler_flags = ["-Wno-error"]
preferred_linkage = "static"

[['cfg(all(version = "=0.17.14", target_arch = "x86_64", target_os = "ios"))'.cxx_library]]
name = "ring-c-asm-ios-x86_64"
srcs = ["crypto/**/*.c", "pregenerated/*x86_64*-macosx.S", "third_party/fiat/asm/*.S"]
headers = ["include/**/*.h", "crypto/**/*.h", "third_party/**/*.h", "crypto/**/*.inl"]
include_paths = ["include"]
fixup_include_paths = ["include"]
compiler_flags = ["-Wno-error"]
preferred_linkage = "static"

[['cfg(all(version = "=0.17.14", target_arch = "aarch64", target_os = "ios"))'.cxx_library]]
name = "ring-c-asm-ios-arm64"
srcs = ["crypto/**/*.c", "pregenerated/*armv8*-ios64.S", "pregenerated/*armx*-ios64.S", "third_party/fiat/asm/*.S"]
exclude = ["crypto/poly1305/poly1305_arm.c"]
headers = ["include/**/*.h", "crypto/**/*.h", "third_party/**/*.h", "crypto/**/*.inl"]
include_paths = ["include"]
fixup_include_paths = ["include"]
compiler_flags = ["-Wno-error"]
preferred_linkage = "static"

[['cfg(all(version = "=0.17.14", target_arch = "x86_64", target_os = "windows"))'.cxx_library]]
name = "ring-c-win-x86_84"
srcs = ["crypto/**/*.c"]
headers = ["include/**/*.h", "crypto/**/*.h", "third_party/**/*.h", "crypto/**/*.inl"]
include_paths = ["include", "."]
fixup_include_paths = ["include"]
compiler_flags = ["-Wno-error"]
preferred_linkage = "static"
[['cfg(all(version = "=0.17.14", target_arch = "x86_64", target_os = "windows"))'.prebuilt_cxx_library]]
name = "ring-asm-windows-x86_84"
static_libs = ["pregenerated/*x86_64*-nasm.o"]
