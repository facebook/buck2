[package]
description = "Serialization framework with content-addressed `Arc` deduplication and runtime polymorphism via typetag"
edition = "2024"
license = { workspace = true }
name = "pagable"
repository = { workspace = true }
version = "0.4.1"

[dependencies]
allocative = { workspace = true }
anyhow = { workspace = true }
async-trait = { workspace = true }
blake3 = { workspace = true }
bytemuck = { version = "1.25", features = ["const_zeroed", "derive", "min_const_generics", "must_cast"] }
dashmap = { workspace = true }
dupe = { workspace = true }
either = { workspace = true }
erased-serde = "0.4.9"
fancy-regex = { workspace = true }
indexmap = { workspace = true }
inventory = { workspace = true }
num-bigint = { workspace = true }
once_cell = { workspace = true }
pagable_derive = { version = "=0.4.1", path = "../pagable_derive" }
parking_lot = { workspace = true }
postcard = { version = "1.0.8", features = ["use-crc", "use-std"] }
regex = { workspace = true }
sequence_trie = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
smallvec = { workspace = true }
sorted_vector_map = { workspace = true }
static_assertions = { workspace = true }
static_interner = { workspace = true }
strong_hash = { workspace = true }
take_mut = { workspace = true }
tokio = { workspace = true, optional = true }
triomphe = { workspace = true }

[features]
default = []
tokio = ["dep:tokio"]

[dev-dependencies]
tokio = { workspace = true }
