lalrpop = { version = "0.19.12", features = ["pico-args"], artifact = "bin:lalrpop", lib = true }
lalrpop-util = "0.19.12"
libc = "0.2.183"
libfuzzer-sys = "0.4.12"
linked-hash-map = { version = "0.5", features = ["serde_impl"] }
linkme = { version = "0.3.32", features = ["used_linker"] }
log = { version = "0.4.29", features = ["kv_unstable"] }
logos = "0.15"
lru = "0.16.3"
lsp-server = "0.7.9"
lsp-types = "0.94.1"
maplit = "1.0"
md-5 = "0.10"
memchr = "2.8.0"
memmap2 = "0.9.10"
memoffset = "0.9.1"
mimalloc = { version = "0.1.48", default-features = false }
multimap = "0.8.3"
native-tls = "0.2.18"
nix = { version = "0.30.1", features = ["dir", "event", "hostname", "inotify", "ioctl", "mman", "mount", "net", "poll", "ptrace", "reboot", "resource", "sched", "signal", "term", "time", "user", "zerocopy"] }
nom = "8"
nom-language = "0.1"
notify = "8.2.0"
num-bigint = { version = "0.4.6", features = ["rand", "serde"] }
