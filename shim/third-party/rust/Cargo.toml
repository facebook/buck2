syn = { version = "2.0.117", features = ["extra-traits", "fold", "full", "visit", "visit-mut"] }
syn1 = { package = "syn", version = "1.0.109", features = ["extra-traits", "fold", "full", "visit", "visit-mut"] }
sync_wrapper = "1.0.2"
synstructure = "0.12.6"
sys-info = "0.9.1"
sysinfo = "0.38.4"
take_mut = "0.2"
tar = "0.4.45"
tempfile = "3.27.0"
termimad = "0.34.1"
termios = "0.3"
