hyper-http-proxy = "1.0"
hyperlocal = { version = "0.9", features = ["client"] }
hyper-proxy2 = { version = "0.1", features = ["rustls"], default-features = false }
hyper-rustls = { version = "0.27.7", features = ["http2"] }
hyper-timeout = "0.5.2"
hyper-util = { version = "0.1.20", features = ["client-legacy", "http1", "http2", "server-auto", "service", "tokio"] }
image = { version = "0.25.10", features = ["bmp", "dds", "ff", "gif", "hdr", "ico", "jpeg", "png", "pnm", "tga", "tiff", "webp"], default-features = false }
