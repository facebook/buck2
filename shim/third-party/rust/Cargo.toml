walkdir = "2.3"
watchman_client = "0.9"
which = "8.0.2"
whoami = "1.5"
winapi = { version = "0.3", features = ["everything", "std"] }
windows-sys = { version = "0.61.2", features = ["Win32_Foundation", "Win32_Globalization", "Win32_NetworkManagement_IpHelper", "Win32_NetworkManagement_Ndis", "Win32_Security", "Win32_Security_Credentials", "Win32_Storage_FileSystem", "Win32_System_Console", "Win32_System_Environment", "Win32_System_IO", "Win32_System_JobObjects", "Win32_System_LibraryLoader", "Win32_System_Memory", "Win32_System_ProcessStatus", "Win32_System_SystemServices", "Win32_System_Threading", "Win32_UI_Shell"] }
windows_x86_64_msvc = "=0.48.0" # our fixup only works if we are on precisely 0.48.0
x509-parser = "0.18.1"
xattr = "1.6.1"
zip = { version = "8.5.1", features = ["aes-crypto", "bzip2", "deflate", "time"] }
zstd = { version = "0.13.3", features = ["experimental", "zstdmt"] }

[patch.crates-io]
# For https://github.com/jimblandy/perf-event/pull/29
# Base on the comment in https://github.com/jimblandy/perf-event/pull/53, we will no long need this patch in future.
perf-event = { git = "https://github.com/Nero5023/perf-event.git", rev = "6dae86b6d4807acec081e6dc0a53167f57f8c0f4", version = "0.4" }
perf-event-open-sys = { git = "https://github.com/Nero5023/perf-event.git", rev = "6dae86b6d4807acec081e6dc0a53167f57f8c0f4", version = "5.0" }

# Windows-specific dependencies
[target."cfg(windows)".dependencies]
winver = "1"
